log syslog all;

router id 10.0.0.2;

protocol device {
  scan time 10;
  interface "-dae*";
}

protocol kernel {
  ipv4 { import none; export none; };
  learn;
}
protocol kernel {
  ipv6 { import none; export none; };
  learn;
}

protocol static {
  ipv4;
  include "/etc/bird/routes4.conf";
}
protocol static {
  ipv6;
  include "/etc/bird/routes6.conf";
}

protocol ospf v2 ospf4 {
  ipv4 {
    import filter {
      if net = 0.0.0.0/0 then reject;
      if net = 127.0.0.0/8 then reject;
      accept;
    };
    export all;
  };
  area 0.0.0.0 {
    interface "enp1s0" {
      type ptp;
      transmit delay 5;
      rx buffer large;
      tx length 2000;
      retransmit 10;
      hello 10;
      dead 40;
    };
  };
}

protocol ospf v3 ospf6 {
  ipv6 {
    import filter {
      if net = ::/0 then reject;
      if net = ::1/128 then reject;
      accept;
    };
    export all;
  };
  area 0.0.0.0 {
    interface "enp1s0" {
      type ptp;
      transmit delay 5;
      rx buffer large;
      tx length 2000;
      retransmit 10;
      hello 10;
      dead 40;
    };
  };
}