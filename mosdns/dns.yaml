plugins:
  ################ DNS #################
  # google
  - tag: google
    type: forward
    args:
      concurrent: 3
      upstreams:
        # DoH
        - addr: "https://dns.google/dns-query"
          dial_addr: "8.8.8.8"
        - addr: "https://dns.google/dns-query"
          dial_addr: "8.8.4.4"
        - addr: "https://dns.google/dns-query"
          dial_addr: "2001:4860:4860::8888"
        - addr: "https://dns.google/dns-query"
          dial_addr: "2001:4860:4860::8844"
        # DoT
        - addr: "tls://dns.google"
          dial_addr: "8.8.8.8"
          enable_pipeline: true
        - addr: "tls://dns.google"
          dial_addr: "8.8.4.4"
          enable_pipeline: true
        - addr: "tls://dns.google"
          dial_addr: "2001:4860:4860::8888"
          enable_pipeline: true
        - addr: "tls://dns.google"
          dial_addr: "2001:4860:4860::8844"
          enable_pipeline: true
        # H3
        - addr: "https://dns.google/dns-query"
          dial_addr: "8.8.8.8"
          enable_http3: true
        - addr: "https://dns.google/dns-query"
          dial_addr: "8.8.4.4"
          enable_http3: true
        - addr: "https://dns.google/dns-query"
          dial_addr: "2001:4860:4860::8888"
          enable_http3: true
        - addr: "https://dns.google/dns-query"
          dial_addr: "2001:4860:4860::8844"
          enable_http3: true

  # cloudflare
  - tag: cloudflare
    type: forward
    args:
      concurrent: 3
      upstreams:
        # DoH
        - addr: "https://cloudflare-dns.com/dns-query"
          dial_addr: "1.1.1.1"
        - addr: "https://cloudflare-dns.com/dns-query"
          dial_addr: "1.0.0.1"
        # DoT
        - addr: "tls://one.one.one.one"
          dial_addr: "1.1.1.1"
          enable_pipeline: true
        - addr: "tls://one.one.one.one"
          dial_addr: "1.0.0.1"
          enable_pipeline: true
        # H3
        - addr: "https://cloudflare-dns.com/dns-query"
          dial_addr: "1.1.1.1"
          enable_http3: true
        - addr: "https://cloudflare-dns.com/dns-query"
          dial_addr: "1.0.0.1"
          enable_http3: true

  # 阿里 DNS
  - tag: ali
    type: forward
    args:
      concurrent: 3
      upstreams:
        # DoH
        - addr: "https://dns.alidns.com/dns-query"
          dial_addr: "223.5.5.5"
        - addr: "https://dns.alidns.com/dns-query"
          dial_addr: "223.6.6.6"
        - addr: "https://dns.alidns.com/dns-query"
          dial_addr: "2400:3200::1"
        - addr: "https://dns.alidns.com/dns-query"
          dial_addr: "2400:3200:baba::1"
        # DoT
        - addr: "tls://dns.alidns.com"
          dial_addr: "223.5.5.5"
          enable_pipeline: true
        - addr: "tls://dns.alidns.com"
          dial_addr: "223.6.6.6"
          enable_pipeline: true
        - addr: "tls://dns.alidns.com"
          dial_addr: "2400:3200::1"
          enable_pipeline: true
        - addr: "tls://dns.alidns.com"
          dial_addr: "2400:3200:baba::1"
          enable_pipeline: true
        # H3
        - addr: "https://dns.alidns.com/dns-query"
          dial_addr: "223.5.5.5"
          enable_http3: true
        - addr: "https://dns.alidns.com/dns-query"
          dial_addr: "223.6.6.6"
          enable_http3: true
        - addr: "https://dns.alidns.com/dns-query"
          dial_addr: "2400:3200::1"
          enable_http3: true
        - addr: "https://dns.alidns.com/dns-query"
          dial_addr: "2400:3200:baba::1"
          enable_http3: true

  # dnspod
  - tag: dnspod
    type: forward
    args:
      concurrent: 3
      upstreams:
        # DoH
        - addr: "https://doh.pub/dns-query"
          dial_addr: "119.29.29.29"
        - addr: "https://doh.pub/dns-query"
          dial_addr: "2402:4e00::"
        # DoT
        - addr: "tls://dot.pub"
          dial_addr: "119.29.29.29"
          enable_pipeline: true
        - addr: "tls://dot.pub"
          dial_addr: "2402:4e00::"
          enable_pipeline: true

  # local dns
  - tag: local
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: "udp://127.0.0.1:53"

  # server 失败
  - tag: reject_2
    type: sequence
    args:
      - exec: reject 2

  # 拒绝响应
  - tag: reject_3
    type: sequence
    args:
      - exec: reject 3

  # 不支持的操作
  - tag: reject_5
    type: sequence
    args:
      - exec: reject 5