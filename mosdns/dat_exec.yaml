plugins:
  # 私网 IP
  - tag: geoip_private
    type: ip_set
    args:
      files:
        - "/etc/mosdns/geodat/geoip_private.txt"
  # cn ip
  - tag: geoip_cn
    type: ip_set
    args:
      files:
        - "/etc/mosdns/geodat/geoip_cn.txt"
  # cn 域名
  - tag: geosite_cn
    type: domain_set
    args:
      files:
        - "/etc/mosdns/geodat/geosite_cn.txt"
  # 白名单
  - tag: whitelist
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/whitelist.txt"
  # gfw 域名
  - tag: geosite_gfw
    type: domain_set
    args:
      files:
        - "/etc/mosdns/geodat/geosite_gfw.txt"
  # 非 cn 域名
  - tag: geosite_location-nocn
    type: domain_set
    args:
      files:
        - "/etc/mosdns/geodat/geosite_geolocation-nocn.txt"

  # 缓存 lan
  - tag: cache_lan
    type: cache
    args:
      size: 8192
      lazy_cache_ttl: 86400

  # 缓存 wan
  - tag: cache_wan
    type: cache
    args:
      size: 131072
      lazy_cache_ttl: 86400

  # no ecs
  - tag: no_ecs
    type: "ecs_handler"
    args:
      forward: false
      #preset: ""
      send: false
      mask4: 24
      mask6: 48

  # 附加 ecs cn 信息
  - tag: ecs_cn
    type: "ecs_handler"
    args:
      forward: false
      #preset: ""
      send: true
      mask4: 24
      mask6: 48

  # 调整 ttl
  - tag: ttl_1m
    type: sequence
    args:
      - exec: ttl 60
  - tag: ttl_5m
    type: sequence
    args:
      - exec: ttl 300
  - tag: ttl_1h
    type: sequence
    args:
      - exec: ttl 3600