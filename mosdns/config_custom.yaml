# 日志配置
log:
  level: info
  file: "/var/log/mosdns.log"

# API 服务配置
api:
  http: "0.0.0.0:8338"

# 引入外部配置
include:
  - "/etc/mosdns/dat_exec.yaml"
  - "/etc/mosdns/dns.yaml"

plugins:
  # 拒绝空域名
  - tag: reject_null_domain
    type: sequence
    args:
      - exec: query_summary reject_null_domain
      - exec: $reject_3

  # 拒绝 qtype 65
  - tag: reject_qtype65
    type: sequence
    args:
      - exec: query_summary reject_qtype65
      - exec: $reject_5
      - exec: return 

  # 国外 DNS 组
  - tag: dns_nocn
    type: "fallback"
    args:
      primary: google
      secondary: cloudflare
      threshold: 500
      always_standby: true

  # 国内 DNS 组
  - tag: dns_cn
    type: "fallback"
    args:
      primary: ali
      secondary: dnspod
      threshold: 300
      always_standby: true

  # 国外 DNS 序列
  - tag: dns_nocn_seq
    type: sequence
    args:
      - exec: query_summary dns_nocn
      - exec: $dns_nocn

  # 国内 DNS 序列
  - tag: dns_cn_seq
    type: sequence
    args:
      - exec: query_summary dns_cn
      - exec: $dns_cn

  # 本地 DNS 序列
  - tag: local_seq
    type: sequence
    args:
      - exec: query_summary local
      - exec: $local

  # fallback 序列（走国外）
  - tag: fallback_seq
    type: sequence
    args:
      - exec: query_summary fallback
      - exec: $dns_nocn

  # other 序列（走国内）
  - tag: other_seq
    type: sequence
    args:
      - exec: query_summary other
      - exec: $dns_cn

  # 处理国外域名
  - tag: query_nocn
    type: sequence
    args:
      - matches: qtype 28
        exec: reject 3
      - exec: $no_ecs
      - exec: $dns_nocn_seq

  # 国内查询验证序列
  - tag: query_cn_smart
    type: sequence
    args:
      - matches: resp_ip $geoip_cn
        exec: accept
      - exec: goto query_nocn

  # 处理国内域名
  - tag: query_cn
    type: sequence
    args:
      - exec: $cache_wan
      - matches: has_resp
        exec: return
      - exec: $ecs_cn
      - exec: $dns_cn_seq
      - exec: goto query_cn_smart

  # fallback 查询（用于未知域名）
  - tag: query_fallback
    type: sequence
    args:
      - matches: qtype 28
        exec: reject 3
      - exec: $no_ecs
      - exec: $fallback_seq

  # 处理局域网域名（含内网 PTR）
  - tag: query_lan
    type: sequence
    args:
      - exec: $cache_lan
      - matches: has_resp
        exec: return
      - exec: $local_seq

  # 其他未分类查询
  - tag: query_other
    type: sequence
    args:
      - exec: $no_ecs
      - exec: $other_seq

  # 反向查询数据库（自动记录 A/AAAA 映射）
  - tag: reverse_db
    type: reverse_lookup
    args: 
      size: 65535
      ttl: 7200
      handle_ptr: true

  # 处理 PTR 查询
  - tag: query_ptr
    type: sequence
    args:
      - matches: "ptr_ip $geoip_private"
        exec: $query_lan
      - matches: has_resp
        exec: accept
      - exec: $reverse_db
      - matches: has_resp
        exec: accept
      - exec: reject 3

  # 最终响应处理器（统一处理反向记录和 TTL）
  - tag: final_handle
    type: sequence
    args:
      - exec: $ttl_5m
      - exec: $reverse_db
      - exec: accept

  # 主流程有响应时跳转至最终处理器
  - tag: has_resp_main
    type: sequence
    args:
      - matches: has_resp
        exec: goto final_handle

  # 预处理序列
  - tag: pre_sequence
    type: sequence
    args:
      - matches: qtype 65
        exec: $reject_qtype65
      - matches: "qname keyword::"
        exec: $reject_null_domain
      - matches: qtype 12
        exec: $query_ptr
      - matches: qtype 255
        exec: $query_other

  # 主解析序列（顺序：缓存 -> 分流 -> 查询 -> 验证）
  - tag: main_sequence
    type: sequence
    args:
      - exec: $cache_wan
      - exec: jump has_resp_main

      - matches: qname $geosite_gfw
        exec: goto query_nocn
      - exec: jump has_resp_main
      
      - matches: qname $whitelist
        exec: goto query_cn
      - exec: jump has_resp_main
      
      - matches: qname $geosite_location-nocn
        exec: goto query_nocn
      - exec: jump has_resp_main
      
      - matches: qname $geosite_cn
        exec: goto query_cn
      - exec: jump has_resp_main

      - exec: $no_ecs
      - exec: $query_fallback
      - exec: jump has_resp_main

  # 总入口序列
  - tag: sequence
    type: sequence
    args:
      - exec: metrics_collector metrics
      - exec: $pre_sequence
      - exec: $main_sequence

  # UDP 服务器
  - type: udp_server
    args:
      entry: sequence
      listen: :5333

  # TCP 服务器
  - type: tcp_server
    args:
      entry: sequence
      listen: :5333