# 日志配置
log:
  level: warn
  file: "/var/log/mosdns.log"

# API 服务配置
api:
  http: "0.0.0.0:8338"

# 引入外部配置
include:
  - "/etc/mosdns/dat_exec.yaml"
  - "/etc/mosdns/dns.yaml"

plugins:
  # 拒绝空域名
  - tag: reject_null_domain
    type: sequence
    args:
      - exec: query_summary reject_null_domain
      - exec: $reject_3

  # 拒绝 qtype 65
  - tag: reject_qtype65
    type: sequence
    args:
      - exec: query_summary reject_qtype65
      - exec: $reject_3

  # 国外 DNS 组
  - tag: dns_nocn
    type: "fallback"
    args:
      primary: google
      secondary: cloudflare
      threshold: 2000
      always_standby: false

  # 国内 DNS 组
  - tag: dns_cn
    type: "fallback"
    args:
      primary: ali
      secondary: dnspod
      threshold: 2000
      always_standby: false

  # 国外 DNS 序列
  - tag: dns_nocn_seq
    type: sequence
    args:
      - exec: query_summary dns_nocn
      - exec: $dns_nocn

  # 国内 DNS 序列
  - tag: dns_cn_seq
    type: sequence
    args:
      - exec: query_summary dns_cn
      - exec: $dns_cn

  # 本地 DNS 序列
  - tag: local_seq
    type: sequence
    args:
      - exec: query_summary local
      - exec: $local

  # fallback 序列（走国外）
  - tag: fallback_seq
    type: sequence
    args:
      - exec: query_summary fallback
      - exec: $dns_nocn

  # other 序列（走国内）
  - tag: other_seq
    type: sequence
    args:
      - exec: query_summary other
      - exec: $dns_cn

  # 处理国内域名
  - tag: query_cn
    type: sequence
    args:
      - exec: $ecs_cn
      - exec: $dns_cn_seq
      - matches: "resp_ip 61.160.148.90/24 221.228.32.13/24 114.237.67.59/24 117.69.71.58/24 180.109.0.0/16 4.36.66.178 8.7.198.45 37.61.54.158 46.82.174.68 59.24.3.173 64.33.88.161 78.16.49.15 93.46.8.89 159.106.121.75 202.106.1.2 202.181.7.85 203.161.230.171 209.145.54.50 211.94.66.147 216.234.179.13 243.185.187.39"
        exec: drop_resp

  # 处理国外域名
  - tag: query_nocn
    type: sequence
    args:
      - matches: qtype 28
        exec: reject 3
      - exec: $no_ecs
      - exec: $dns_nocn_seq
      - matches: "resp_ip $geoip_cn 61.160.148.90/24 221.228.32.13/24 114.237.67.59/24 117.69.71.58/24 180.109.0.0/16 4.36.66.178 8.7.198.45 37.61.54.158 46.82.174.68 59.24.3.173 64.33.88.161 78.16.49.15 93.46.8.89 159.106.121.75 202.106.1.2 202.181.7.85 203.161.230.171 209.145.54.50 211.94.66.147 216.234.179.13 243.185.187.39"
        exec: drop_resp

  # 智能国内查询（先国内，若响应IP不在国内则回退国外）
  - tag: query_cn_smart
    type: sequence
    args:
      - exec: $query_cn
      - matches: "resp_ip $geoip_cn"
        exec: accept
      - exec: $query_nocn
      - exec: accept

  # fallback 查询
  - tag: query_fallback
    type: sequence
    args:
      - matches: qtype 28
        exec: reject 3
      - exec: $no_ecs
      - exec: $fallback_seq
      - matches: "resp_ip $geoip_cn 61.160.148.90/24 221.228.32.13/24 114.237.67.59/24 117.69.71.58/24 180.109.0.0/16 4.36.66.178 8.7.198.45 37.61.54.158 46.82.174.68 59.24.3.173 64.33.88.161 78.16.49.15 93.46.8.89 159.106.121.75 202.106.1.2 202.181.7.85 203.161.230.171 209.145.54.50 211.94.66.147 216.234.179.13 243.185.187.39"
        exec: drop_resp

  # 处理局域网域名（含内网 PTR）
  - tag: query_lan
    type: sequence
    args:
      - exec: $cache_lan
      - matches: has_resp
        exec: return
      - exec: $local_seq

  # 其他未分类查询
  - tag: query_other
    type: sequence
    args:
      - exec: $no_ecs
      - exec: $other_seq

  # 反向查询数据库（自动记录 A/AAAA 映射）
  - tag: reverse_db
    type: reverse_lookup
    args: 
      size: 65535
      ttl: 7200
      handle_ptr: true

  # 处理 PTR 查询
  - tag: query_ptr
    type: sequence
    args:
      - matches: "ptr_ip $geoip_private"
        exec: $query_lan
      - matches: has_resp
        exec: accept
      - exec: $reverse_db
      - matches: has_resp
        exec: accept
      - exec: reject 3

  # 预处理结果处理（加入反向记录）
  - tag: pre_handle
    type: sequence
    args:
      - exec: $ttl_1h
      - exec: $reverse_db
      - exec: accept

  # 主流程结果处理（加入反向记录）
  - tag: main_handle
    type: sequence
    args:
      - exec: $ttl_5m
      - exec: $reverse_db
      - exec: accept

  # 预处理有响应时跳转
  - tag: has_resp_pre
    type: sequence
    args:
      - matches: has_resp
        exec: goto pre_handle

  # 主流程有响应时跳转
  - tag: has_resp_main
    type: sequence
    args:
      - matches: has_resp
        exec: goto main_handle

  # 预处理序列
  - tag: pre_sequence
    type: sequence
    args:
      - matches: qtype 65
        exec: $reject_qtype65
      - matches: "qname keyword::"
        exec: $reject_null_domain
      - matches: qtype 12
        exec: $query_ptr
      - matches: qtype 255
        exec: $query_other
      - exec: jump has_resp_pre

  # 主解析序列
  - tag: main_sequence
    type: sequence
    args:
      - exec: $cache_wan
      - exec: jump has_resp_main
      - matches: qname $geosite_gfw
        exec: $query_nocn
      - exec: jump has_resp_main
      - matches: qname $whitelist
        exec: $query_cn
      - exec: jump has_resp_main
      - matches: qname $geosite_location-nocn
        exec: $query_nocn
      - exec: jump has_resp_main
      - matches: qname $geosite_cn
        exec: $query_cn_smart
      - exec: jump has_resp_main
      - exec: $no_ecs
      - exec: $query_fallback
      - exec: jump has_resp_main

  # 总入口序列
  - tag: sequence
    type: sequence
    args:
      - exec: metrics_collector metrics
      - exec: $pre_sequence
      - exec: $main_sequence

  # UDP 服务器
  - type: udp_server
    args:
      entry: sequence
      listen: :5333

  # TCP 服务器
  - type: tcp_server
    args:
      entry: sequence
      listen: :5333